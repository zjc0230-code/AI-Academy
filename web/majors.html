<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>所有专业 — AI Academy</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif; background: #f0f4ff; color: #1a1a2e; }
    .header { background: linear-gradient(135deg, #1a1a2e 0%, #0f3460 100%); color: white; padding: 48px 24px 40px; text-align: center; }
    .header .back { display: inline-flex; align-items: center; gap: 6px; color: rgba(255,255,255,0.7); text-decoration: none; font-size: 0.875rem; margin-bottom: 24px; transition: color 0.2s; }
    .header .back:hover { color: white; }
    .header h1 { font-size: 2.2rem; font-weight: 800; margin-bottom: 12px; }
    .header p { opacity: 0.85; font-size: 1rem; line-height: 1.7; max-width: 700px; margin: 0 auto 24px; }
    .header .stats { display: flex; justify-content: center; gap: 32px; flex-wrap: wrap; }
    .stat-item { display: flex; flex-direction: column; align-items: center; }
    .stat-num { font-size: 2rem; font-weight: 800; color: #0f3460; }
    .stat-label { font-size: 0.875rem; opacity: 0.7; }

    .search-section { background: white; padding: 24px; border-bottom: 1px solid #e5e7eb; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .search-box { max-width: 800px; margin: 0 auto; display: flex; gap: 12px; }
    .search-input { flex: 1; padding: 14px 18px; border: 2px solid #e5e7eb; border-radius: 10px; font-size: 1rem; transition: all 0.2s; }
    .search-input:focus { outline: none; border-color: #0f3460; }
    .search-btn { padding: 14px 28px; background: #0f3460; color: white; border: none; border-radius: 10px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background 0.2s; }
    .search-btn:hover { background: #1a1a2e; }

    .filter-tabs { max-width: 800px; margin: 20px auto 0; display: flex; gap: 8px; flex-wrap: wrap; }
    .filter-tab { padding: 8px 16px; border: 1px solid #e5e7eb; border-radius: 20px; font-size: 0.875rem; font-weight: 500; cursor: pointer; transition: all 0.2s; background: white; color: #6b7280; }
    .filter-tab:hover, .filter-tab.active { background: #0f3460; color: white; border-color: #0f3460; }

    .container { max-width: 1100px; margin: 0 auto; padding: 40px 24px; }

    .category-section { margin-bottom: 48px; }
    .category-title { font-size: 1.5rem; font-weight: 800; margin-bottom: 24px; padding-bottom: 12px; border-bottom: 3px solid #0f3460; display: flex; align-items: center; gap: 12px; }
    .category-icon { font-size: 1.8rem; }

    .major-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; }
    .major-card { background: white; border-radius: 14px; padding: 24px; border: 1px solid #e5e7eb; transition: all 0.25s; cursor: pointer; text-decoration: none; color: inherit; }
    .major-card:hover { box-shadow: 0 8px 30px rgba(0,0,0,0.12); transform: translateY(-4px); border-color: #0f3460; }
    .major-card .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
    .major-card .major-icon { font-size: 2rem; }
    .major-card .code-badge { font-family: monospace; font-size: 0.75rem; background: #f0f4ff; color: #0f3460; padding: 4px 10px; border-radius: 6px; font-weight: 700; }
    .major-card h3 { font-size: 1.15rem; font-weight: 700; margin-bottom: 8px; color: #1a1a2e; }
    .major-card p { font-size: 0.875rem; color: #6b7280; line-height: 1.6; margin-bottom: 14px; }
    .major-card .skills-preview { display: flex; flex-wrap: wrap; gap: 4px; }
    .major-card .skill-tag { font-size: 0.7rem; background: #f3f4f6; color: #374151; padding: 2px 8px; border-radius: 6px; }
    .major-card .meta { display: flex; gap: 16px; margin-top: 14px; padding-top: 12px; border-top: 1px solid #f3f4f6; font-size: 0.8rem; color: #6b7280; }
    .major-card .meta-item { display: flex; align-items: center; gap: 4px; }

    .empty-state { text-align: center; padding: 60px 20px; color: #6b7280; }
    .empty-state .icon { font-size: 4rem; margin-bottom: 16px; opacity: 0.5; }
    .empty-state h3 { font-size: 1.5rem; margin-bottom: 8px; }
    .empty-state p { font-size: 1rem; }

    footer { background: #1a1a2e; color: rgba(255,255,255,0.6); text-align: center; padding: 24px; font-size: 0.875rem; }
    footer a { color: #0f3460; text-decoration: none; }

    @media(max-width:640px) {
      .header h1 { font-size: 1.75rem; }
      .major-grid { grid-template-columns: 1fr; }
      .search-box { flex-direction: column; }
      .search-btn { width: 100%; }
      .filter-tabs { justify-content: center; }
    }
  </style>
</head>
<body>

<div class="header">
  <a href="index.html" class="back">← 返回首页</a>
  <h1>📚 所有专业</h1>
  <p>AI Academy 提供 10 个学科门类、28 个专业，共 136 个技能，赋能 AI Agent 的标准化专业能力</p>
  <div class="stats">
    <div class="stat-item"><div class="stat-num">10</div><div class="stat-label">学科门类</div></div>
    <div class="stat-item"><div class="stat-num">28</div><div class="stat-label">具体专业</div></div>
    <div class="stat-item"><div class="stat-num">136</div><div class="stat-label">专业技能</div></div>
  </div>
</div>

<div class="search-section">
  <div class="search-box">
    <input type="text" id="searchInput" class="search-input" placeholder="搜索专业名称、技能或关键词...">
    <button class="search-btn" onclick="filterMajors()">🔍 搜索</button>
  </div>
  <div class="filter-tabs" id="filterTabs">
    <button class="filter-tab active" onclick="filterByCategory('all')">全部专业</button>
    <button class="filter-tab" onclick="filterByCategory('IT')">信息技术</button>
    <button class="filter-tab" onclick="filterByCategory('BM')">商务管理</button>
    <button class="filter-tab" onclick="filterByCategory('SM')">自媒体运营</button>
    <button class="filter-tab" onclick="filterByCategory('CC')">内容创作</button>
    <button class="filter-tab" onclick="filterByCategory('CS')">客户服务</button>
    <button class="filter-tab" onclick="filterByCategory('HC')">健康医疗</button>
    <button class="filter-tab" onclick="filterByCategory('ED')">教育培训</button>
    <button class="filter-tab" onclick="filterByCategory('LG')">法务合规</button>
    <button class="filter-tab" onclick="filterByCategory('AD')">艺术设计</button>
  </div>
</div>

<div class="container" id="majorsContainer">
  <!-- 专业列表将通过 JS 动态生成 -->
</div>

<footer>
  <p>🏫 AI Academy · 28 个专业 · 136 个技能</p>
  <p style="margin-top:6px;"><a href="index.html">返回首页</a> · <a href="https://github.com/zjc0230-code/AI-Academy" target="_blank">GitHub</a></p>
</footer>

<script>
const majorsData = [
  {
    category: 'IT',
    categoryName: '信息技术',
    categoryIcon: '💻',
    majors: [
      { code: 'IT-A-1-1', name: '软件工程', icon: '💻', desc: '需求分析、算法设计、编程开发全套能力', skills: 3, preview: ['需求', '设计', '算法', '数据结构'], path: 'IT-A-1-1-software-engineering' },
      { code: 'IT-A-1-2', name: '前端开发', icon: '🎨', desc: 'HTML/CSS/JavaScript、前端框架、响应式设计', skills: 5, preview: ['HTML', 'CSS', 'JavaScript', 'Vue', 'React'], path: 'IT-A-1-2-frontend-development' },
      { code: 'IT-A-1-3', name: '后端开发', icon: '⚙️', desc: '后端框架、数据库、API设计、微服务架构', skills: 5, preview: ['API', '数据库', '微服务', '服务器', '运维'], path: 'IT-A-1-3-backend-development' },
      { code: 'IT-A-2-1', name: '数据科学', icon: '📊', desc: '数据采集、统计分析、机器学习、数据可视化', skills: 5, preview: ['数据采集', '统计分析', '机器学习', '可视化'], path: 'IT-A-2-1-data-science' },
      { code: 'IT-A-2-2', name: '数据分析', icon: '📈', desc: '数据查询、统计分析、业务洞察、数据报告', skills: 5, preview: ['数据查询', '统计分析', '业务洞察', '数据报告'], path: 'IT-A-2-2-data-analysis' },
      { code: 'IT-A-2-3', name: '人工智能', icon: '🤖', desc: '机器学习、深度学习、NLP、计算机视觉', skills: 5, preview: ['机器学习', '深度学习', 'NLP', '计算机视觉'], path: 'IT-A-2-3-artificial-intelligence' },
      { code: 'IT-A-3-1', name: '网络安全', icon: '🔒', desc: '安全基础、渗透测试、漏洞挖掘、安全加固', skills: 5, preview: ['渗透测试', '漏洞挖掘', '安全加固', '威胁情报'], path: 'IT-A-3-1-cybersecurity' },
      { code: 'IT-A-4-1', name: 'DevOps', icon: '🚀', desc: '版本控制、CI/CD、容器化、监控告警', skills: 5, preview: ['版本控制', 'CI/CD', '容器', '监控', 'IaC'], path: 'IT-A-4-1-devops' }
    ]
  },
  {
    category: 'BM',
    categoryName: '商务管理',
    categoryIcon: '👔',
    majors: [
      { code: 'BM-A-1-1', name: '会计', icon: '📊', desc: '财务核算、报表编制、税务筹划、成本控制', skills: 5, preview: ['财务核算', '报表', '税务', '成本', '审计'], path: 'BM-A-1-1-accounting' },
      { code: 'BM-A-1-2', name: '市场营销', icon: '📢', desc: '市场分析、品牌管理、数字营销、用户运营', skills: 5, preview: ['市场分析', '品牌', '数字营销', '用户运营'], path: 'BM-A-1-2-marketing' },
      { code: 'BM-A-1-3', name: '项目管理', icon: '📋', desc: '项目规划、进度管理、资源协调、风险管理', skills: 5, preview: ['项目规划', '进度管理', '资源', '风险'], path: 'BM-A-1-3-project-management' }
    ]
  },
  {
    category: 'SM',
    categoryName: '自媒体运营',
    categoryIcon: '🎥',
    majors: [
      { code: 'SM-A-1-1', name: '小红书运营', icon: '📱', desc: '平台认知、账号搭建、内容创作、流量获取、粉丝运营、数据分析、变现技巧、品牌营销、爆款打造、矩阵运营、危机公关', skills: 11, preview: ['账号搭建', '内容创作', '流量', '粉丝运营', '数据分析', '变现', '爆款', '矩阵运营'], path: 'SM-A-1-1-xiaohongshu' }
    ]
  },
  {
    category: 'CC',
    categoryName: '内容创作',
    categoryIcon: '✍️',
    majors: [
      { code: 'CC-A-1-1', name: '文案写作', icon: '📝', desc: '标题创作、产品文案、广告文案、新媒体文案、品牌故事', skills: 5, preview: ['标题创作', '产品文案', '广告', '新媒体', '品牌故事'], path: 'CC-A-1-1-copywriting' }
    ]
  },
  {
    category: 'CS',
    categoryName: '客户服务',
    categoryIcon: '💬',
    majors: [
      { code: 'CS-A-1-1', name: '客户服务', icon: '🤝', desc: '客户沟通、问题解决、服务流程、客户关系管理', skills: 5, preview: ['客户沟通', '问题解决', '服务流程', 'CRM'], path: 'CS-A-1-1-customer-service' }
    ]
  },
  {
    category: 'HC',
    categoryName: '健康医疗',
    categoryIcon: '💪',
    majors: [
      { code: 'HC-A-1-1', name: '健康管理', icon: '💪', desc: '健康评估、运动指导、营养膳食、心理调适、慢性病管理', skills: 5, preview: ['健康评估', '运动指导', '营养', '心理调适', '慢性病'], path: 'HC-A-1-1-health-management' }
    ]
  },
  {
    category: 'ED',
    categoryName: '教育培训',
    categoryIcon: '📖',
    majors: [
      { code: 'ED-A-1-1', name: '在线教学', icon: '📖', desc: '课程设计、教学实施、学生管理、课程运营、效果评估', skills: 5, preview: ['课程设计', '教学实施', '学生管理', '课程运营'], path: 'ED-A-1-1-online-teaching' }
    ]
  },
  {
    category: 'LG',
    categoryName: '法务合规',
    categoryIcon: '⚖️',
    majors: [
      { code: 'LG-A-1-1', name: '合同审查', icon: '⚖️', desc: '合同条款审查、风险识别、法律合规、合同起草', skills: 5, preview: ['条款审查', '风险识别', '合规', '合同起草'], path: 'LG-A-1-1-contract-review' }
    ]
  },
  {
    category: 'AD',
    categoryName: '艺术设计',
    categoryIcon: '🎨',
    majors: [
      { code: 'AD-A-1-1', name: '平面设计', icon: '🎨', desc: '视觉设计原理、排版设计、色彩搭配、品牌视觉、设计软件', skills: 5, preview: ['视觉设计', '排版', '色彩', '品牌VI', '设计软件'], path: 'AD-A-1-1-graphic-design' }
    ]
  }
];

let currentCategory = 'all';
let currentSearch = '';

function renderMajors() {
  const container = document.getElementById('majorsContainer');
  let html = '';

  majorsData.forEach(category => {
    if (currentCategory !== 'all' && category.category !== currentCategory) return;

    const filteredMajors = category.majors.filter(major => {
      if (!currentSearch) return true;
      const searchLower = currentSearch.toLowerCase();
      return major.name.toLowerCase().includes(searchLower) ||
             major.code.toLowerCase().includes(searchLower) ||
             major.desc.toLowerCase().includes(searchLower) ||
             major.preview.some(skill => skill.toLowerCase().includes(searchLower));
    });

    if (filteredMajors.length === 0) return;

    html += `<div class="category-section">`;
    html += `<h2 class="category-title"><span class="category-icon">${category.categoryIcon}</span>${category.categoryName}</h2>`;
    html += `<div class="major-grid">`;

    filteredMajors.forEach(major => {
      html += `
        <a href="majors/${major.path}/index.html" class="major-card">
          <div class="card-header">
            <span class="major-icon">${major.icon}</span>
            <span class="code-badge">${major.code}</span>
          </div>
          <h3>${major.name}</h3>
          <p>${major.desc}</p>
          <div class="skills-preview">
            ${major.preview.slice(0, 4).map(s => `<span class="skill-tag">${s}</span>`).join('')}
            ${major.preview.length > 4 ? `<span class="skill-tag">+${major.preview.length - 4}</span>` : ''}
          </div>
          <div class="meta">
            <span class="meta-item">📋 ${major.skills} 个技能</span>
            <span class="meta-item">🦞 小龙虾</span>
          </div>
        </a>
      `;
    });

    html += `</div></div>`;
  });

  if (!html) {
    html = `
      <div class="empty-state">
        <div class="icon">🔍</div>
        <h3>未找到相关专业</h3>
        <p>请尝试其他搜索关键词或筛选条件</p>
      </div>
    `;
  }

  container.innerHTML = html;
}

function filterByCategory(category) {
  currentCategory = category;

  // 更新标签状态
  document.querySelectorAll('.filter-tab').forEach(tab => {
    tab.classList.remove('active');
  });
  event.target.classList.add('active');

  renderMajors();
}

function filterMajors() {
  currentSearch = document.getElementById('searchInput').value.trim();
  renderMajors();
}

// 监听回车键
document.getElementById('searchInput').addEventListener('keypress', function(e) {
  if (e.key === 'Enter') {
    filterMajors();
  }
});

// 初始渲染
renderMajors();
</script>

</body>
</html>
